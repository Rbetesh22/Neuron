<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Neuron</title>

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Neuron">
  <meta name="theme-color" content="#fafaf8">
  <link rel="manifest" href="/manifest.json">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* backgrounds */
      --bg:         #fafaf8;   /* warm off-white — editorial feel */
      --sidebar-bg: #ffffff;   /* clean white sidebar (Gmail / Apple Mail) */
      --surface:    #ffffff;
      --surface-2:  #f2f0ec;   /* hover / elevated */
      --border:     rgba(0,0,0,0.07);
      --border-mid: rgba(0,0,0,0.12);
      /* accent = dark charcoal — no colored chrome, only typography rules */
      --accent:     #1c1c1e;   /* iOS system label — warm near-black */
      --accent-dim: rgba(0,0,0,0.05);
      /* text hierarchy (iOS label system) */
      --text:       #1c1c1e;
      --text-2:     #6c6c70;
      --text-3:     #aeaeb2;
      /* semantic — blue reserved for real hyperlinks only */
      --link:       #1a56db;
      --success:    #34c759;
      --danger:     #ff3b30;
      --warning:    #ff9f0a;
      --font:       -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      --mono:       "SF Mono", ui-monospace, Menlo, monospace;
      --sidebar-w:  200px;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }

    body {
      font-family: var(--font);
      color: var(--text);
      display: flex;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ──────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 16px 14px 12px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: var(--text);
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 4px;
    }

    .nav-section { margin-bottom: 1px; }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 10px 10px 2px;
      opacity: 0.7;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 9px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      text-decoration: none;
      line-height: 1;
    }

    .nav-item:hover  { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: rgba(0,0,0,0.06); color: var(--text); font-weight: 600; }
    .nav-item svg    { flex-shrink: 0; opacity: 0.5; }
    .nav-item.active svg { opacity: 0.85; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 8px 8px 10px;
    }

    #sync-btn {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border-mid);
      border-radius: 7px;
      background: transparent;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all 0.12s;
    }

    #sync-btn:hover  { background: var(--surface-2); color: var(--text); }
    #sync-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── MAIN ─────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    #topbar-title { font-size: 13px; font-weight: 600; letter-spacing: .01em; color: var(--text); }
    #topbar-meta  { font-size: 11.5px; color: var(--text-3); }

    #content    { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
    #input-area { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg); padding: 14px 20px; }
    #input-area.hidden { display: none; }

    /* ── SCROLLBAR ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

    /* ── PROSE ────────────────────────────────────────────────────── */
    .prose {
      font-size: 14.5px;
      line-height: 1.72;
      color: var(--text);
    }
    .prose h1 { font-size: 1.3em; font-weight: 700; margin: 1.1em 0 0.4em; letter-spacing: -0.4px; }
    .prose h2 { font-size: 1.05em; font-weight: 700; margin: 1.4em 0 0.4em; color: var(--text); letter-spacing: -0.2px; }
    .prose h3 { font-size: 0.95em; font-weight: 600; margin: 0.9em 0 0.3em; color: var(--text-2); }
    .prose p  { margin: 0.45em 0; }
    .prose ul, .prose ol { padding-left: 1.4em; margin: 0.35em 0; }
    .prose li { margin: 0.15em 0; }
    .prose strong { font-weight: 600; }
    .prose code {
      font-family: var(--mono);
      font-size: 0.84em;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
    .prose blockquote {
      border-left: 2px solid var(--border-mid);
      padding: 0.2em 0.8em;
      margin: 0.5em 0;
      color: var(--text-2);
    }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 0.9em 0; }
    .prose a  { color: var(--link); }

    .cite {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; line-height: 1;
      color: var(--text-2); background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 4px; margin: 0 1px;
      cursor: pointer; vertical-align: super;
      transition: background 0.1s;
      font-style: normal; font-family: var(--font);
    }
    .cite:hover { background: var(--border-mid); color: var(--text); }

    .cite-highlight {
      background: var(--surface-2) !important;
      color: var(--text) !important;
    }

    /* ── PILL BAR ─────────────────────────────────────────────────── */
    .pill-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

    .pill {
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border-mid);
      background: var(--surface);
      color: var(--text-2);
      font-family: var(--font);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s var(--ease);
    }
    .pill:hover  { border-color: var(--text); color: var(--text); }
    .pill.active { background: var(--text); border-color: var(--text); color: #fff; }

    /* ── INPUT / BUTTON ───────────────────────────────────────────── */
    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea, input[type="url"], input[type="text"] {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border-mid);
      border-radius: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-font-smoothing: antialiased;
      resize: none;
    }
    textarea:focus, input:focus {
      border-color: rgba(0,0,0,0.3);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }
    textarea { width: 100%; }
    textarea::placeholder, input::placeholder { color: var(--text-3); }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s var(--ease);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-primary { background: var(--text); color: #fff; }
    .btn-primary:hover   { opacity: 0.82; }
    .btn-primary:active  { opacity: 0.68; }
    .btn-primary:disabled { opacity: 0.35; cursor: default; }

    /* ── SPINNER ──────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 1.5px solid var(--border-mid);
      border-top-color: var(--text-2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    .loading-row {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-2); font-size: 13.5px; padding: 28px 24px;
    }

    /* ── STREAMING CURSOR ─────────────────────────────────────────── */
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    .streaming::after {
      content: '';
      display: inline-block;
      width: 2px; height: 0.9em;
      background: var(--text-3);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-start infinite;
      border-radius: 1px;
    }

    /* ── WELCOME ──────────────────────────────────────────────────── */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; padding: 40px; text-align: center;
    }
    .welcome-mark {
      width: 40px; height: 40px;
      background: var(--text);
      border-radius: 10px;
      margin-bottom: 18px;
    }
    .welcome h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
    .welcome p  { font-size: 13.5px; color: var(--text-2); max-width: 340px; line-height: 1.6; margin-bottom: 24px; }

    .suggestion-grid { display: flex; flex-direction: column; gap: 2px; }
    .suggestion {
      padding: 6px 0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13.5px;
      color: var(--text-2);
      text-align: left;
      line-height: 1.5;
      transition: color 0.1s;
    }
    .suggestion:hover { color: var(--text); }

    /* hover-dim: for news/media card links */
    a.hover-dim { transition: opacity 0.12s; }
    a.hover-dim:hover { opacity: 0.75; }

    /* ── ANSWER ───────────────────────────────────────────────────── */
    .answer-wrap { max-width: 700px; margin: 0 auto; padding: 32px 28px; }

    .question-header {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .answer-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    /* ── SOURCES ──────────────────────────────────────────────────── */
    .sources-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .sources-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 10px;
    }
    .sources-grid { display: flex; flex-wrap: wrap; gap: 7px; }

    .source-chip {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 11px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.14s var(--ease);
      max-width: 210px;
      text-align: left;
    }
    .source-chip:hover {
      border-color: rgba(0,0,0,0.22);
      background: var(--surface-2);
    }
    .chip-icon  { font-size: 14px; flex-shrink: 0; }
    .chip-title { font-size: 11.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 145px; }
    .chip-sub   { font-size: 10px; color: var(--text-3); }

    /* ── STAT CARDS ───────────────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 27px; font-weight: 700; letter-spacing: -0.8px; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--text-2); }

    /* ── SOURCE BAR ───────────────────────────────────────────────── */
    .source-bar { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .bar-icon   { width: 20px; text-align: center; font-size: 14px; flex-shrink: 0; }
    .bar-name   { font-size: 12.5px; color: var(--text); width: 110px; flex-shrink: 0; }
    .bar-track  { flex: 1; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
    .bar-fill   { height: 100%; background: var(--accent); border-radius: 2px; }
    .bar-count  { font-size: 11px; color: var(--text-3); width: 48px; text-align: right; flex-shrink: 0; }

    /* ── CARD ─────────────────────────────────────────────────────── */
    .card { padding: 16px 0; border-bottom: 1px solid var(--border); }

    /* ── CALENDAR ─────────────────────────────────────────────────── */
    .cal-day { margin-bottom: 22px; }
    .cal-day-header {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-2);
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .today-badge {
      background: var(--accent); color: #fff;
      font-size: 10px; padding: 2px 8px; border-radius: 100px;
      font-weight: 600; letter-spacing: 0.02em;
    }
    .cal-event {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      transition: background 0.12s;
    }
    .cal-event:hover { background: var(--surface-2); }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
    .cal-title { font-size: 13.5px; color: var(--text); }
    .cal-sub   { font-size: 11.5px; color: var(--text-2); margin-top: 1px; }

    /* ── RECENT ───────────────────────────────────────────────────── */
    .recent-group { margin-bottom: 24px; }
    .recent-group-header {
      font-size: 11.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-2);
      padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .recent-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; transition: background 0.12s; }
    .recent-item:hover { background: var(--surface-2); }
    .recent-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .recent-sub   { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .recent-date  { font-size: 11px; color: var(--text-3); flex-shrink: 0; }

    /* ── INGEST ───────────────────────────────────────────────────── */
    .ingest-wrap { max-width: 560px; margin: 0 auto; padding: 32px 24px; }
    .ingest-wrap h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
    .ingest-wrap p  { font-size: 13.5px; color: var(--text-2); line-height: 1.65; margin-bottom: 20px; }

    .drop-zone {
      border: 2px dashed var(--border-mid);
      border-radius: 18px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s var(--ease);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: rgba(0,0,0,0.28);
      background: rgba(0,0,0,0.02);
    }
    .drop-zone-icon { margin-bottom: 12px; display:flex; justify-content:center; }
    .drop-zone h3   { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
    .drop-zone p    { font-size: 13px; color: var(--text-2); margin: 0; }

    /* ── ALERT ────────────────────────────────────────────────────── */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid;
      line-height: 1.5;
      margin-top: 14px;
    }
    .alert-success { background: rgba(52,199,89,0.1); border-color: rgba(52,199,89,0.3); color: #1a7b3a; }
    .alert-error   { background: rgba(255,59,48,0.1); border-color: rgba(255,59,48,0.3); color: #c0392b; }
    @media (prefers-color-scheme: dark) {
      .alert-success { color: #4cd964; }
      .alert-error   { color: #ff6b6b; }
    }

    /* ── FADE ─────────────────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .fade-up { animation: fadeIn 0.18s ease both; }

    /* ── DRAWER ───────────────────────────────────────────────────── */
    #drawer { position: fixed; inset: 0; z-index: 200; display: none; }
    #drawer.open { display: block; }
    .drawer-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .drawer-panel {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      box-shadow: -8px 0 32px rgba(0,0,0,0.14);
    }
    .drawer-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .drawer-head-text { flex: 1; min-width: 0; }
    .drawer-title  { font-size: 14px; font-weight: 600; }
    .drawer-source { font-size: 11.5px; color: var(--text-2); margin-top: 2px; }
    .drawer-close {
      width: 26px; height: 26px; border-radius: 50%;
      border: none; background: var(--surface-2); color: var(--text-2);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.12s;
    }
    .drawer-close:hover { background: var(--border-mid); color: var(--text); }
    .drawer-link {
      display: none;
      margin: 12px 18px 0;
      padding: 9px 12px;
      background: var(--surface-2);
      border-radius: 8px;
      font-size: 12px; color: var(--link);
      word-break: break-all;
      text-decoration: none;
    }
    .drawer-link:hover { text-decoration: underline; }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 16px 18px;
      font-size: 13.5px; line-height: 1.75;
      color: var(--text-2); white-space: pre-wrap; word-break: break-word;
    }

    /* ── iOS / MOBILE ─────────────────────────────────────────────── */
    /* Safe area insets for notch / home indicator */
    #sidebar    { padding-bottom: env(safe-area-inset-bottom); }
    #topbar     { padding-left: max(24px, env(safe-area-inset-left)); }
    #input-area { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }

    /* On narrow screens: collapse sidebar into a bottom tab bar */
    @media (max-width: 680px) {
      html, body { overflow: hidden; }
      body { flex-direction: column; }

      #sidebar {
        width: 100%; height: auto;
        border-right: none;
        border-top: 1px solid var(--border);
        order: 2;
        flex-direction: row;
        align-items: stretch;
        padding-bottom: env(safe-area-inset-bottom);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #sidebar::-webkit-scrollbar { display: none; }
      .sidebar-logo, .nav-divider, .nav-label, .sidebar-footer { display: none; }
      .sidebar-body { display: flex; flex-direction: row; flex: 1; overflow: visible; padding: 0; }
      .nav-section { display: flex; flex-direction: row; margin: 0; }
      .nav-item {
        flex-direction: column; gap: 3px; padding: 8px 10px; min-width: 60px;
        border-radius: 0; font-size: 9.5px; font-weight: 500;
        align-items: center; justify-content: center; text-align: center;
        height: 52px; line-height: 1; flex-shrink: 0;
      }
      .nav-item svg { margin: 0; opacity: 0.6; }
      .nav-item.active { background: transparent; color: var(--text); font-weight: 700; }
      .nav-item.active svg { opacity: 1; }
      /* Only show top-level nav items in mobile tab bar */
      #nav-status, #nav-note, #nav-url, #nav-file,
      #nav-goodnotes, #nav-youtube, #nav-timeline { display: none; }

      #main { order: 1; flex: 1; overflow: hidden; }
      #topbar { height: 48px; padding: 0 16px; padding-top: env(safe-area-inset-top); }
      #content { -webkit-overflow-scrolling: touch; }

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const ICONS = {
  canvas:'🎓',calendar:'📅',gmail:'✉️',gdrive:'📂',web:'🌐',
  youtube:'📺',note:'📝',file:'📄',granola:'🎙️',kindle:'📚',
  readwise:'📖',notion:'🗒️',github:'💻',podcast:'🎧',
  apple_notes:'📓',spotify:'🎵',twitter:'🐦',bookmarks:'🔖',
  instagram:'📸',tiktok:'📱',goodreads:'📗',letterboxd:'🎬',
  photos:'📷',voice_memo:'🎙️',trakt:'🎬',pocket:'📌',
  folder:'📁',youtube_liked:'👍',goodnotes:'📒',
};

let mode = null, queryType = 'ask', abortCtrl = null, sources = [];

// ── Utilities ─────────────────────────────────────────────────────────────
function setTopbar(title, meta='') { $('topbar-title').textContent=title; $('topbar-meta').textContent=meta; }
function showInput(html) { const el=$('input-area'); el.innerHTML=html; el.className=''; }
function hideInput() { $('input-area').className='hidden'; }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,180)+'px'; }

function setActive(m) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const el = $('nav-'+m); if(el) el.classList.add('active');
}

function loading(msg='Loading…') {
  return `<div class="loading-row"><span class="spinner"></span>${esc(msg)}</div>`;
}

function renderCitations(html) {
  // Turn [1], [2][3] etc. into clickable superscripts that highlight the source chip
  return html.replace(/\[(\d+)\]/g, (_, n) => {
    return `<sup class="cite" onclick="highlightSource(${n})">[${n}]</sup>`;
  });
}

function highlightSource(n) {
  const chips = document.querySelectorAll('.source-chip');
  chips.forEach(c => c.classList.remove('cite-highlight'));
  const chip = chips[n - 1];
  if (chip) {
    chip.classList.add('cite-highlight');
    chip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => chip.classList.remove('cite-highlight'), 2000);
  }
}

function alertHtml(msg, type='success') {
  return `<div class="alert alert-${type}">${esc(msg)}</div>`;
}

async function api(path, opts={}) {
  const r = await fetch(path, { headers:{'Content-Type':'application/json'}, ...opts });
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || `Error ${r.status}`);
  return d;
}

// ── Mode router ────────────────────────────────────────────────────────────
function setMode(m) {
  if (abortCtrl) { abortCtrl.abort(); abortCtrl=null; }
  mode = m;
  setActive(m);
  ({ask:renderAsk,digest:renderDigest,recent:renderRecent,upcoming:renderUpcoming,
    note:renderNote,url:renderURL,file:renderFile,youtube:renderYT,status:renderStatus,
    spark:renderSpark,practice:renderPractice,timeline:renderTimeline,news:renderNews,
    goodnotes:renderGoodNotes})[m]?.();
}

// ── ASK ────────────────────────────────────────────────────────────────────
const FALLBACK_SUGGESTIONS = [
  'What am I working on this week?',
  'Summarize my recent meetings',
  "What's due soon from my courses?",
  'What have I been reading lately?',
];

function renderAsk() {
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const dayStr = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  setTopbar('Neuron', dayStr);
  hideInput();

  const pills = ['ask','context','resurface','connections'];
  const pillLabels = {ask:'Ask',context:'Deep Dive',resurface:'Resurface',connections:'Thread Map'};
  const pillDescs = {
    ask: 'Ask anything…',
    context: 'Everything your KB says on a topic…',
    resurface: 'What did you save about this?',
    connections: 'How does this thread through your KB?',
  };

  $('content').innerHTML = `
    <div style="max-width:660px;margin:0 auto;padding:36px 28px 80px;" class="fade-up">

      <!-- Greeting + ask -->
      <div style="margin-bottom:32px;">
        <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:16px;">${greeting}</div>
        <div class="input-row" style="gap:8px;margin-bottom:8px;">
          <textarea id="ask-inp" rows="1" placeholder="Ask anything…"
            onkeydown="askKey(event)" oninput="autoResize(this)" style="font-size:14px;padding:11px 15px;"></textarea>
          <button class="btn btn-primary" id="ask-btn" onclick="runAsk()">Ask</button>
        </div>
        <div class="pill-bar" style="margin-bottom:0;">
          ${pills.map(t => `<button class="pill${t===queryType?' active':''}" id="pill-${t}" onclick="setQType('${t}')" title="${pillDescs[t]||''}">${pillLabels[t]}</button>`).join('')}
        </div>
      </div>

      <!-- Suggestions (minimal) -->
      <div style="margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div id="suggestion-grid" style="display:flex;flex-direction:column;gap:4px;">
          ${FALLBACK_SUGGESTIONS.map(q=>`<button class="suggestion" onclick="quickAsk(${JSON.stringify(q)})">${esc(q)}</button>`).join('')}
        </div>
      </div>

      <!-- What's on -->
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);">On Your Plate</div>
          <button onclick="setMode('digest')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">Full digest →</button>
        </div>
        <div id="home-digest" style="color:var(--text-2);font-size:13.5px;line-height:1.7;"></div>
      </div>

      <!-- News -->
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);">Today's World</div>
          <button onclick="setMode('news')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">See all →</button>
        </div>
        <div id="home-news" style="display:flex;gap:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;"></div>
      </div>

      <!-- Spark -->
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);">Connection</div>
          <button onclick="setMode('spark')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">All sparks →</button>
        </div>
        <div id="home-spark" style="color:var(--text-2);font-size:13.5px;line-height:1.7;"></div>
      </div>

      <!-- Worth your time -->
      <div>
        <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;">Worth Your Time</div>
        <div id="home-recs"></div>
      </div>

    </div>
  `;

  setTimeout(() => { const el=$('ask-inp'); if(el){ el.focus(); autoResize(el); } }, 50);

  // Load suggestions (replace list items on arrival)
  fetch('/suggestions').then(r=>r.json()).then(d=>{
    const grid = $('suggestion-grid');
    if(!grid || !d.suggestions?.length) return;
    grid.innerHTML = d.suggestions.map(q=>`<button class="suggestion" onclick="quickAsk(${JSON.stringify(q)})">${esc(q)}</button>`).join('');
  }).catch(()=>{});

  // Digest — uses cache so should be fast
  fetch('/digest').then(r=>r.json()).then(d=>{
    const el = $('home-digest'); if(!el) return;
    const result = d.result || '';
    const m = result.match(/##\s*What Needs Attention\s*\n([\s\S]*?)(?=##|$)/i);
    const text = m ? m[1].trim() : result.split('\n').filter(l=>l.trim()).slice(0,4).join('\n');
    el.innerHTML = `<div class="prose" style="font-size:13.5px;">${marked.parse(text.slice(0,400))}</div>`;
  }).catch(()=>{ const el=$('home-digest'); if(el) el.textContent=''; });

  // News — uses cache so fast on repeat visits
  fetch('/news').then(r=>r.json()).then(d=>{
    const el = $('home-news'); if(!el) return;
    const arts = (d.articles||[]).filter(a=>a.image).slice(0,7);
    if(!arts.length){ el.style.display='none'; return; }
    el.innerHTML = arts.map(a=>`
      <a href="${esc(a.url)}" target="_blank" rel="noopener" class="hover-dim" style="display:flex;flex-direction:column;width:148px;flex-shrink:0;text-decoration:none;">
        <div style="width:148px;height:88px;background:url('${esc(a.image)}') center/cover no-repeat;border-radius:8px;margin-bottom:6px;"></div>
        <div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;">${esc(a.source)}</div>
        <div style="font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;">${esc(a.title.slice(0,65))}${a.title.length>65?'…':''}</div>
      </a>`).join('');
  }).catch(()=>{ const el=$('home-news'); if(el) el.style.display='none'; });

  // Spark — uses cache
  fetch('/spark?days_recent=14&days_old=60').then(r=>r.json()).then(d=>{
    const el = $('home-spark'); if(!el) return;
    const spark = (d.sparks||[])[0];
    if(!spark){ el.style.display='none'; return; }
    el.innerHTML = `
      <div style="font-size:14px;font-weight:600;line-height:1.35;margin-bottom:6px;color:var(--text);">${esc(spark.title||'')}</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:8px;">${esc((spark.recent_item||'').slice(0,55))} → ${esc((spark.past_item||'').slice(0,55))}</div>
      <div style="font-size:13.5px;color:var(--text-2);line-height:1.65;">${esc((spark.connection||'').slice(0,220))}…</div>`;
  }).catch(()=>{ const el=$('home-spark'); if(el) el.style.display='none'; });

  // Recommendations — 6hr cache, load last
  fetch('/recommendations').then(r=>r.json()).then(d=>{
    const el = $('home-recs'); if(!el) return;
    const recs = d.recommendations || [];
    if(!recs.length){ el.style.display='none'; return; }
    const recIcon = t => t==='book'?'📖':t==='youtube'?'📺':'🎧';
    el.innerHTML = recs.map((r,i)=>`
      <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;${i<recs.length-1?'border-bottom:1px solid var(--border);':''}">
        <div style="font-size:18px;flex-shrink:0;margin-top:1px;line-height:1;">${recIcon(r.type)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:1px;line-height:1.3;">${esc(r.title||'')}</div>
          <div style="font-size:12px;color:var(--text-3);margin-bottom:5px;">${esc(r.author_or_show||'')}</div>
          <div style="font-size:12.5px;color:var(--text-2);line-height:1.55;margin-bottom:8px;">${esc(r.why||'')}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${r.link?`<a href="${esc(r.link)}" target="_blank" rel="noopener" style="font-size:11.5px;color:var(--link);text-decoration:none;border:1px solid var(--border-mid);border-radius:6px;padding:3px 10px;white-space:nowrap;">${esc(r.link_label||'Open')}</a>`:''}
            ${r.link2?`<a href="${esc(r.link2)}" target="_blank" rel="noopener" style="font-size:11.5px;color:var(--text-2);text-decoration:none;border:1px solid var(--border-mid);border-radius:6px;padding:3px 10px;white-space:nowrap;">${esc(r.link2_label||'')}</a>`:''}
          </div>
        </div>
      </div>`).join('');
  }).catch(()=>{ const el=$('home-recs'); if(el) el.style.display='none'; });
}

function setQType(t) {
  queryType = t;
  ['ask','context','resurface','connections'].forEach(k => {
    const el=$('pill-'+k); if(el) el.classList.toggle('active', k===t);
  });
  const inp = $('ask-inp');
  const descs = {ask:'Ask anything…',context:'Everything your KB says on a topic…',resurface:'What did you save about this?',connections:'How does this thread through your KB?'};
  if (inp) inp.placeholder = descs[t] || 'Ask anything…';
}

function quickAsk(q) { const el=$('ask-inp'); if(el){el.value=q;autoResize(el);} runAsk(); }
function askKey(e)   { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();runAsk();} }

async function runAsk() {
  const inp=$('ask-inp'); if(!inp) return;
  const q = inp.value.trim(); if(!q) return;
  if(abortCtrl){abortCtrl.abort();} abortCtrl=new AbortController();

  const btn=$('ask-btn'); if(btn){btn.disabled=true;btn.textContent='…';}

  // Switch to answer view — show bottom bar for follow-ups
  const pills2 = ['ask','context','resurface','connections'];
  const pillLabels2 = {ask:'Ask',context:'Deep Dive',resurface:'Resurface',connections:'Thread Map'};
  const pillDescs2 = {ask:'Ask anything…',context:'Everything your KB says on a topic…',resurface:'What did you save about this?',connections:'How does this thread through your KB?'};
  showInput(`
    <div style="margin-bottom:8px;display:flex;gap:5px;align-items:center;">
      <button onclick="setMode('ask')" style="padding:4px 10px;border:1px solid var(--border-mid);border-radius:7px;background:none;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer;flex-shrink:0;">← Home</button>
      <div style="flex:1;display:flex;gap:4px;flex-wrap:wrap;">
        ${pills2.map(t => `<button class="pill${t===queryType?' active':''}" id="pill-${t}" onclick="setQType('${t}')" title="${pillDescs2[t]||''}">${pillLabels2[t]}</button>`).join('')}
      </div>
    </div>
    <div class="input-row">
      <textarea id="ask-inp" rows="1" placeholder="${pillDescs2[queryType]||'Ask a follow-up…'}"
        onkeydown="askKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn btn-primary" id="ask-btn" onclick="runAsk()">Ask</button>
    </div>
  `);

  $('content').innerHTML = `
    <div class="answer-wrap fade-up">
      <div class="question-header">${esc(q)}</div>
      <div class="answer-divider"></div>
      <div id="ans" class="prose streaming"></div>
      <div id="src"></div>
    </div>
  `;

  const ans=$('ans'), src=$('src');
  sources = [];

  try {
    if (queryType === 'ask') {
      let text = '';
      const resp = await fetch('/ask/stream', {
        method:'POST', signal:abortCtrl.signal,
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({q, n_results:25}),
      });
      if(!resp.ok) throw new Error(`Server error ${resp.status}`);
      const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
      while(true) {
        const {done,value}=await reader.read(); if(done) break;
        buf += dec.decode(value,{stream:true});
        const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const line of lines) {
          if(!line.startsWith('data: ')) continue;
          try {
            const ev=JSON.parse(line.slice(6));
            if(ev.type==='sources') { sources=ev.sources||[]; renderSources(src,sources); }
            else if(ev.type==='token') { text+=ev.text; ans.innerHTML=renderCitations(marked.parse(text)); }
            else if(ev.type==='done') {
              text=ev.answer||text; ans.innerHTML=renderCitations(marked.parse(text)); ans.classList.remove('streaming');
              if(ev.sources?.length){sources=ev.sources;renderSources(src,sources);}
            } else if(ev.type==='error') throw new Error(ev.detail);
          } catch(_){}
        }
      }
      ans.classList.remove('streaming');
    } else {
      ans.innerHTML = loading('Thinking…');
      const ep = {context:'/context',resurface:'/resurface',connections:'/connections'}[queryType];
      const d = await api(ep, {method:'POST',signal:abortCtrl.signal,body:JSON.stringify({q,n_results:25})});
      sources = d.sources||[];
      ans.innerHTML = renderCitations(marked.parse(d.context_pack||d.result||d.answer||'No result.'));
      renderSources(src, sources);
    }
  } catch(err) {
    if(err.name==='AbortError') return;
    ans.classList.remove('streaming');
    ans.innerHTML = `<div class="alert alert-error">Error: ${esc(err.message)}</div>`;
  } finally {
    if(btn){btn.disabled=false;btn.textContent='Ask';} abortCtrl=null;
  }
}

// ── DIGEST ─────────────────────────────────────────────────────────────────
function _parseDigestSections(md) {
  // Split digest markdown into named sections
  const sections = {};
  const lines = md.split('\n');
  let cur = 'intro', buf = [];
  for (const line of lines) {
    const h = line.match(/^#{1,3}\s+(.+)/);
    if (h) {
      if (buf.length) sections[cur] = buf.join('\n').trim();
      cur = h[1].trim();
      buf = [];
    } else {
      buf.push(line);
    }
  }
  if (buf.length) sections[cur] = buf.join('\n').trim();
  return sections;
}

async function renderDigest(forceRefresh=false) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const editionStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  setTopbar('Digest', dateStr); hideInput();

  $('content').innerHTML = `
    <div style="max-width:720px;margin:0 auto;padding:32px 28px 60px;">
      <div style="text-align:center;padding-bottom:18px;border-bottom:2px solid var(--border-mid);margin-bottom:24px;">
        <div style="font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;">Personal Briefing</div>
        <div style="font-size:28px;font-weight:800;letter-spacing:-0.8px;line-height:1;">${dateStr}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:5px;">Updated ${editionStr} · Neuron</div>
      </div>
      <div style="text-align:center;padding:18px 0;">${loading('Building your briefing…')}</div>
    </div>`;

  try {
    const url = forceRefresh ? '/digest?refresh=true' : '/digest';
    const d = await api(url);
    sources = d.sources || [];
    const raw = d.result || '';
    const secs = _parseDigestSections(raw);
    const cachedAt = d.cached_at ? new Date(d.cached_at) : null;
    const cacheLabel = cachedAt ? cachedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : editionStr;

    // Render each section as a newspaper column block
    function secBlock(title, icon='') {
      const body = secs[title] || '';
      if (!body) return '';
      return `
        <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
          <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">${icon} ${title}</div>
          <div class="prose" style="font-size:14.5px;line-height:1.78;">${marked.parse(body)}</div>
        </div>`;
    }

    const sectionOrder = ['What Needs Attention','On Your Plate','Your World','Worth Exploring','One Thread Worth Pulling'];
    const icons = {'What Needs Attention':'⚠', 'On Your Plate':'📋', 'Your World':'🌍', 'Worth Exploring':'📖', 'One Thread Worth Pulling':'💡'};
    let bodyHtml = sectionOrder.map(s => secBlock(s, icons[s])).join('');

    // Fallback: if no sections parsed, just render the whole thing
    if (!bodyHtml.trim()) {
      bodyHtml = `<div class="prose" style="font-size:14.5px;line-height:1.78;">${marked.parse(raw)}</div>`;
    }

    $('content').innerHTML = `
      <div style="max-width:720px;margin:0 auto;padding:32px 28px 60px;">
        <!-- Masthead -->
        <div style="text-align:center;padding-bottom:18px;border-bottom:2px solid var(--border-mid);margin-bottom:32px;">
          <div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;">Personal Briefing</div>
          <div style="font-size:28px;font-weight:800;letter-spacing:-0.8px;line-height:1;">${dateStr}</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px;">
            <div style="font-size:11px;color:var(--text-3);">Updated ${cacheLabel}</div>
            <button onclick="renderDigest(true)" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">↻ Refresh</button>
          </div>
        </div>

        <!-- Sections -->
        ${bodyHtml}

        <!-- Daily extras (fact + vocab) -->
        <div id="daily-extras" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;"></div>

        <!-- Sources -->
        <div id="src"></div>
      </div>`;

    renderSources($('src'), sources);

    // Load daily fact + vocab (24hr cache, fast)
    fetch('/daily').then(r=>r.json()).then(d=>{
      const el = $('daily-extras');
      if (!el) return;
      let html = '';

      if (d.fact) {
        html += `
          <div style="background:var(--surface-2);border-radius:12px;padding:16px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">✦ Today's Fact</div>
            <div style="font-size:13.5px;line-height:1.7;color:var(--text-2);">${esc(d.fact)}</div>
          </div>`;
      }

      if (d.vocab) {
        const v = d.vocab;
        html += `
          <div style="background:var(--surface-2);border-radius:12px;padding:16px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">A Word to Know</div>
            <div style="margin-bottom:6px;">
              <span style="font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;">${esc(v.word||'')}</span>
              ${v.pronunciation ? `<span style="font-size:12px;color:var(--text-3);margin-left:6px;">${esc(v.pronunciation)}</span>` : ''}
              ${v.part_of_speech ? `<span style="font-size:11px;font-style:italic;color:var(--text-3);margin-left:4px;">${esc(v.part_of_speech)}</span>` : ''}
            </div>
            <div style="font-size:13.5px;color:var(--text);line-height:1.6;margin-bottom:6px;">${esc(v.definition||'')}</div>
            ${v.etymology ? `<div style="font-size:11.5px;color:var(--text-3);line-height:1.5;margin-bottom:6px;font-style:italic;">${esc(v.etymology)}</div>` : ''}

          </div>`;
      }

      if (html) el.innerHTML = html;
      else el.style.display = 'none';
    }).catch(() => { const el=$('daily-extras'); if(el) el.style.display='none'; });

  } catch(e) {
    $('content').innerHTML=`<div style="padding:32px 24px;">${alertHtml(e.message,'error')}</div>`;
  }
}

          <button class="source-chip" onclick="openDrawer(${i})">
            <span class="chip-icon">${s.icon||'📌'}</span>
            <div>
              <div class="chip-title">${esc((s.title||'').slice(0,44))}</div>
              <div class="chip-sub">[${s.index||i+1}] ${esc(s.source||'')}</div>

      </div>
    </div>
  `;
}

// ── SPARKS ────────────────────────────────────────────────────────────────────
async function renderSpark(forceRefresh=false) {
  setTopbar('Sparks', 'Unexpected connections in your knowledge');
  hideInput();
  $('content').innerHTML = `<div style="padding:32px 24px;">${loading(forceRefresh ? 'Discovering new connections…' : 'Loading sparks…')}</div>`;

  try {
    const url = forceRefresh ? '/spark?days_recent=14&days_old=60&refresh=true' : '/spark?days_recent=14&days_old=60';
    const d = await api(url);
    const sparks = d.sparks || [];
    const cachedAt = d.cached_at ? new Date(d.cached_at) : null;
    const cacheLabel = cachedAt ? cachedAt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';

    if (!sparks.length) {
      $('content').innerHTML = `
        <div style="padding:40px 24px;max-width:560px;">
          <div style="width:40px;height:40px;background:var(--surface-2);border-radius:12px;margin-bottom:16px;border:1px solid var(--border-mid);"></div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;">No sparks yet</div>
          <div style="font-size:13.5px;color:var(--text-2);line-height:1.65;">${esc(d.message||'Keep ingesting content and check back soon.')}</div>
        </div>`;
      return;
    }

    setTopbar('Sparks', `${sparks.length} connection${sparks.length===1?'':'s'}`);

    let html = '<div style="padding:24px 28px 60px;max-width:680px;" class="fade-up">';
    html += `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:20px;">
        <div>
          <div style="font-size:13px;color:var(--text-2);line-height:1.65;">Patterns across your knowledge — things you studied at different times that share the same underlying idea.</div>
          ${cacheLabel ? `<div style="font-size:11.5px;color:var(--text-3);margin-top:4px;">Updated at ${cacheLabel}</div>` : ''}
        </div>
        <button onclick="renderSpark(true)" style="flex-shrink:0;padding:5px 13px;border:1px solid var(--border-mid);border-radius:8px;background:none;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer;white-space:nowrap;">
          ↻ New
        </button>
      </div>
    `;

    sparks.forEach((spark, si) => {
      const q = JSON.stringify(`Explore the connection between: ${spark.title||'this topic'}`);
      const isLast = si === sparks.length - 1;
      html += `
        <div style="padding:22px 0;${isLast ? '' : 'border-bottom:1px solid var(--border);'}">
          <div style="font-size:15.5px;font-weight:650;letter-spacing:-0.3px;line-height:1.35;color:var(--text);margin-bottom:6px;">${esc(spark.title||'Connection')}</div>
          <div style="font-size:11.5px;color:var(--text-3);margin-bottom:14px;">${esc((spark.recent_item||'').slice(0,80))} → ${esc((spark.past_item||'').slice(0,80))}</div>
          <div style="font-size:14px;color:var(--text);line-height:1.75;margin-bottom:10px;">${esc(spark.connection||'')}</div>
          <div style="font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:16px;">${esc(spark.why_it_matters||'')}</div>
          <button onclick="quickAsk(${q});setMode('ask');"
            style="font-size:12px;color:var(--text-3);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">
            Explore →
          </button>
        </div>`;
    });
    html += '</div>';
    $('content').innerHTML = html;
  } catch(e) {
    $('content').innerHTML = `<div style="padding:32px 24px;">${alertHtml(e.message,'error')}</div>`;
  }
}

// ── PRACTICE ──────────────────────────────────────────────────────────────────
let practiceExercises = [], practiceIdx = 0, practiceTopic = '', practiceAnswered = false;

const PRACTICE_SUGGESTIONS = [
  'Operating Systems', 'Algorithms', 'Financial Accounting', 'Software Engineering',
  'Data Structures', 'Networking', 'Machine Learning',
];

function renderPractice() {
  setTopbar('Practice', 'Reinforce what you\'ve learned');
  $('content').innerHTML = `
    <div class="ingest-wrap fade-up" style="max-width:620px;">
      <h2 style="font-size:20px;">What do you want to practice?</h2>
      <p>Neuron generates exercises from everything you've ever ingested — notes, courses, highlights, meetings.</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 4px;">
        ${PRACTICE_SUGGESTIONS.map(t => `<button class="pill" onclick="quickPractice('${t}')">${esc(t)}</button>`).join('')}
      </div>
      <div id="practice-alert"></div>
    </div>
  `;
  showInput(`
    <div class="input-row">
      <input type="text" id="practice-inp" style="flex:1;" placeholder="Python, Macroeconomics, Renaissance art, Machine learning…"
        onkeydown="if(event.key==='Enter') startPractice()">
      <button class="btn btn-primary" id="practice-btn" onclick="startPractice()">Generate Exercises</button>
    </div>
  `);
  setTimeout(() => $('practice-inp')?.focus(), 60);
}

function quickPractice(topic) {
  const inp = $('practice-inp');
  if (inp) { inp.value = topic; }
  startPractice();
}

async function startPractice() {
  const inp = $('practice-inp'), btn = $('practice-btn'), al = $('practice-alert');
  const topic = inp?.value.trim(); if(!topic) return;
  btn.disabled = true; btn.textContent = 'Generating…';
  al.innerHTML = `<div class="alert" style="border-color:var(--border-mid);background:var(--surface-2);">${loading('Finding your knowledge on this topic and generating exercises…')}</div>`;

  try {
    const d = await api('/practice', { method:'POST', body: JSON.stringify({ topic }) });
    practiceExercises = d.exercises || [];
    practiceTopic = topic;

    if (!practiceExercises.length) {
      al.innerHTML = alertHtml(d.message || `Nothing found about "${topic}". Try ingesting some notes or courses first.`, 'error');
      return;
    }

    practiceIdx = 0;
    practiceAnswered = false;
    hideInput();
    showExercise(0);
  } catch(e) {
    al.innerHTML = alertHtml(e.message, 'error');
  } finally {
    if(btn) { btn.disabled = false; btn.textContent = 'Generate Exercises'; }
  }
}

function showExercise(idx) {
  if (idx >= practiceExercises.length) {
    // All done
    $('content').innerHTML = `
      <div class="welcome fade-up">
        <div class="welcome-mark" style="background:var(--success);"></div>
        <h2>All done!</h2>
        <p>You completed all ${practiceExercises.length} exercises on ${esc(practiceTopic)}. Keep practicing to lock in the knowledge.</p>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button class="btn btn-primary" onclick="startPractice()">Practice Again</button>
          <button class="btn" style="background:var(--surface-2);border:1px solid var(--border-mid);color:var(--text);"
            onclick="setMode('practice')">New Topic</button>
        </div>
      </div>`;
    hideInput();
    return;
  }

  practiceAnswered = false;
  const ex = practiceExercises[idx];
  const diffColors = { easy:'#34c759', medium:'#ff9f0a', hard:'#ff375f' };
  const typeLabels = { concept:'Concept', application:'Application', coding:'Coding' };
  const progress = `${idx+1} / ${practiceExercises.length}`;
  const pct = Math.round((idx / practiceExercises.length) * 100);

  $('content').innerHTML = `
    <div style="max-width:680px;margin:0 auto;padding:28px 24px;" class="fade-up">
      <!-- Progress -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div style="font-size:12px;color:var(--text-2);font-weight:500;">${esc(practiceTopic)} · Exercise ${progress}</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:120px;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;"></div>
          </div>
          <span style="font-size:11px;color:var(--text-3);">${pct}%</span>
        </div>
      </div>

      <!-- Exercise card -->
      <div style="margin-bottom:16px;padding:20px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:14px;">
          <span style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:100px;background:${diffColors[ex.difficulty]||'#636366'}22;color:${diffColors[ex.difficulty]||'var(--text-2)'};">${ex.difficulty||'medium'}</span>
          <span style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);padding:2px 8px;border-radius:100px;background:var(--surface-2);">${typeLabels[ex.type]||ex.type||'Exercise'}</span>
          ${ex.source_hint ? `<span style="font-size:11px;color:var(--text-3);">· ${esc(ex.source_hint)}</span>` : ''}
        </div>
        <div style="font-size:15px;font-weight:500;line-height:1.65;color:var(--text);margin-bottom:${ex.type==='coding'?'16px':'0'};">${esc(ex.question||'')}</div>
        ${ex.type==='coding' ? `<div style="font-size:11px;color:var(--text-3);margin-top:4px;">Write your code in the box below — it won't be executed, just evaluated by Neuron</div>` : ''}
      </div>

      <!-- Answer area -->
      <textarea id="ex-answer" rows="${ex.type==='coding'?8:3}"
        style="width:100%;font-family:${ex.type==='coding'?'var(--mono)':'var(--font)'};font-size:${ex.type==='coding'?'13px':'14px'};background:var(--surface);border:1.5px solid var(--border-mid);border-radius:12px;padding:12px 14px;color:var(--text);outline:none;line-height:1.6;transition:border-color .15s;resize:vertical;"
        placeholder="${ex.type==='coding' ? '# Write your code here…' : 'Type your answer…'}"
        onfocus="this.style.borderColor='rgba(0,0,0,0.3)';this.style.boxShadow='0 0 0 3px rgba(0,0,0,0.05)'"
        onblur="this.style.borderColor='var(--border-mid)';this.style.boxShadow='none'"></textarea>

      <!-- Feedback area -->
      <div id="ex-feedback" style="margin-top:12px;display:none;"></div>

      <div style="display:flex;gap:8px;margin-top:12px;" id="ex-actions">
        <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
        <button class="btn" style="background:var(--surface-2);border:1px solid var(--border-mid);color:var(--text-2);"
          onclick="showHint()">Hint</button>
        <div style="flex:1;"></div>
        <button class="btn" style="background:none;border:none;color:var(--text-3);font-size:12px;"
          onclick="skipExercise()">Skip →</button>
      </div>

      <div id="ex-hint" style="display:none;margin-top:10px;padding:10px 14px;background:var(--surface-2);border-radius:10px;font-size:13px;color:var(--text-2);line-height:1.6;border:1px solid var(--border);">
        ${esc(ex.answer || '')}
      </div>
    </div>
  `;

  setTimeout(() => $('ex-answer')?.focus(), 60);
}

function showHint() {
  const hintEl = $('ex-hint');
  if(hintEl) hintEl.style.display = hintEl.style.display === 'none' ? 'block' : 'none';
}

function skipExercise() {
  practiceIdx++;
  showExercise(practiceIdx);
}

async function checkAnswer() {
  if (practiceAnswered) return;
  const ansEl = $('ex-answer'), feedbackEl = $('ex-feedback'), actEl = $('ex-actions');
  if (!ansEl || !feedbackEl) return;
  const userAnswer = ansEl.value.trim();
  if (!userAnswer) { ansEl.focus(); return; }

  practiceAnswered = true;
  const ex = practiceExercises[practiceIdx];
  feedbackEl.style.display = 'block';
  feedbackEl.innerHTML = `<div class="alert" style="border-color:var(--border-mid);background:var(--surface-2);">${loading('Evaluating your answer…')}</div>`;

  // Disable check button
  actEl.querySelector('button').disabled = true;

  try {
    const d = await api('/practice/evaluate', {
      method: 'POST',
      body: JSON.stringify({
        question: ex.question || '',
        user_answer: userAnswer,
        correct_answer: ex.answer || '',
        explanation: ex.explanation || '',
        topic: practiceTopic,
      }),
    });

    const scoreColors = { correct:'var(--success)', partial:'#ff9f0a', incorrect:'var(--danger)' };
    const scoreLabels = { correct:'✓ Correct', partial:'◐ Partially correct', incorrect:'✗ Needs work' };
    const score = d.score || 'partial';
    const color = scoreColors[score] || 'var(--text-2)';

    feedbackEl.innerHTML = `
      <div style="padding:14px 16px;background:var(--surface);border:1.5px solid ${color};border-radius:12px;">
        <div style="font-size:12px;font-weight:700;color:${color};margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;">${scoreLabels[score]||score}</div>
        <div style="font-size:13.5px;line-height:1.7;color:var(--text);margin-bottom:${d.key_gap?'8px':'0'}">${esc(d.feedback||'')}</div>
        ${d.key_gap ? `<div style="font-size:12.5px;color:var(--text-2);margin-bottom:8px;">Key point: ${esc(d.key_gap)}</div>` : ''}
        ${d.follow_up ? `<div style="font-size:12px;color:var(--accent);font-weight:500;margin-top:4px;">Follow-up: ${esc(d.follow_up)}</div>` : ''}
      </div>
    `;

    // Show next button
    actEl.innerHTML = `
      <div style="font-size:13px;color:var(--text-2);font-weight:500;">
        ${esc(ex.answer ? 'Answer: ' + ex.answer.slice(0,120) + (ex.answer.length>120?'…':'') : '')}
      </div>
      <div style="flex:1;"></div>
      <button class="btn btn-primary" onclick="practiceIdx++;showExercise(practiceIdx)">
        ${practiceIdx < practiceExercises.length - 1 ? 'Next Exercise →' : 'Finish'}
      </button>
    `;
  } catch(e) {
    feedbackEl.innerHTML = alertHtml(e.message, 'error');
    practiceAnswered = false;
    actEl.querySelector('button').disabled = false;
  }
}

  gmail:'#ff3b30', gdrive:'#34c759', notion:'#8e44ad', readwise:'#e67e22',
  kindle:'#e67e22', spotify:'#1ed760', youtube:'#ff0000', web:'#5856d6',
  github:'#24292e', calendar:'#ff9f0a', file:'#636366', podcast:'#8e44ad',
  voice_memo:'#ff3b30', twitter:'#1da1f2', goodreads:'#36382e',

async function renderTimeline() {
  setTopbar('Timeline', 'Your learning journey over time');
  hideInput();
  $('content').innerHTML = `<div style="padding:32px 24px;">${loading('Building your learning timeline…')}</div>`;

  try {
    const d = await api('/timeline?weeks=16');
    const weeks = d.weeks || [];
    const heatmap = d.heatmap || [];

    if (!weeks.length) {
      $('content').innerHTML = `<div style="padding:32px 24px;color:var(--text-2);font-size:14px;">No dated content found. Sync your sources to build your timeline.</div>`;
      return;
    }

    setTopbar('Timeline', `${d.total} items · last ${d.period_weeks} weeks`);

    // Build heatmap grid (last 16 weeks = 112 days, show as grid of 7 cols)
    const hm16 = heatmap.slice(-112);
    const maxCount = Math.max(...hm16.map(x=>x.count), 1);

    function heatCell(item) {
      const intensity = Math.min(item.count / maxCount, 1);
      const alpha = item.count === 0 ? 0.06 : 0.15 + intensity * 0.85;
      const bg = item.count === 0 ? 'var(--surface-2)' : `rgba(0,113,227,${alpha.toFixed(2)})`;
      const title = `${item.date}: ${item.count} item${item.count===1?'':'s'}`;
      return `<div style="width:11px;height:11px;border-radius:2px;background:${bg};flex-shrink:0;" title="${title}"></div>`;
    }

    // Day labels
    const dayLetters = ['M','T','W','T','F','S','S'];

    let html = '<div style="padding:24px;max-width:720px;" class="fade-up">';

    // Heatmap section
    html += `
      <div style="margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;">Activity · last 16 weeks</div>
        <div style="display:flex;gap:6px;">
          <div style="display:flex;flex-direction:column;gap:2px;padding-top:1px;">
            ${dayLetters.map(l=>`<div style="font-size:9px;color:var(--text-3);height:11px;line-height:11px;width:10px;">${l}</div>`).join('')}
          </div>
          <div style="display:grid;grid-template-rows:repeat(7,11px);grid-auto-columns:11px;grid-auto-flow:column;gap:2px;flex:1;">
            ${hm16.map(item => heatCell(item)).join('')}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:12px;justify-content:flex-end;">
          <span style="font-size:10px;color:var(--text-3);">Less</span>
          ${[0.06,0.3,0.55,0.8,1].map(a=>`<div style="width:10px;height:10px;border-radius:2px;background:rgba(0,113,227,${a});"></div>`).join('')}
          <span style="font-size:10px;color:var(--text-3);">More</span>
        </div>
      </div>
    `;

    // Week rows (cleaner, no card borders)
    for (const week of weeks) {
      const topSources = Object.entries(week.sources).sort((a,b)=>b[1]-a[1]).slice(0,3);

      html += `<div style="margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:14px;font-weight:600;letter-spacing:-0.2px;">${esc(week.label)}</div>
          <div style="display:flex;gap:8px;align-items:center;">
            ${topSources.map(([src,cnt])=>`
              <span style="font-size:11px;color:var(--text-3);">${ICONS[src]||''}${esc(src.replace(/_/g,' '))}&thinsp;${cnt}</span>`).join('<span style="color:var(--border-mid);">·</span>')}
          </div>
        </div>
        <div>
          ${week.top_items.slice(0,6).map(item=>`
            <div style="display:flex;align-items:center;gap:10px;padding:5px 0;cursor:pointer;"
              onclick="quickAsk(${JSON.stringify('Tell me about: ' + item.title)});setMode('ask');">
              <span style="font-size:12px;flex-shrink:0;opacity:0.7;">${ICONS[item.source]||'📌'}</span>
              <span style="font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(item.title)}</span>
              <span style="font-size:11px;color:var(--text-3);flex-shrink:0;">${item.date||''}</span>
            </div>`).join('')}
          ${week.top_items.length > 6 ? `<div style="font-size:11.5px;color:var(--text-3);margin-top:4px;">+${week.top_items.length - 6} more this week</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
    $('content').innerHTML = html;
  } catch(e) {
    $('content').innerHTML = `<div style="padding:32px 24px;">${alertHtml(e.message,'error')}</div>`;
  }
}

// ── NEWS ────────────────────────────────────────────────────────────────────────
const NEWS_CAT_COLORS = {World:'#ff375f',Israel:'#0038b8',Politics:'#ff9f0a',Tech:'#0071e3',AI:'#5856d6',Finance:'#34c759',Sports:'#ff6b35',Torah:'#6c5ce7'};
const NEWS_CAT_ICONS = {World:'🌍',Israel:'🇮🇱',Politics:'🏛',Tech:'💻',AI:'✦',Finance:'📈',Sports:'⚽',Torah:'✡'};
const NEWS_CAT_ORDER = ['World','Israel','Politics','Tech','AI','Finance','Sports','Torah'];
let newsActiveCat = 'All';
let _newsBycat = {};

function _newsCardHtml(a, size='normal') {
  const large = size === 'hero';
  const medium = size === 'medium';
  const imgH = large ? '220px' : medium ? '160px' : '116px';
  const titleSize = large ? '17px' : medium ? '14.5px' : '13px';
  const titleWeight = large ? '700' : '600';
  return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="hover-dim"
    style="display:block;text-decoration:none;">
    ${a.image
      ? `<div style="width:100%;height:${imgH};background:url('${esc(a.image)}') center/cover no-repeat;background-color:var(--surface-2);border-radius:10px;margin-bottom:8px;flex-shrink:0;"></div>`
      : `<div style="width:100%;height:${large?'140px':medium?'100px':'72px'};background:var(--surface-2);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
           <span style="font-size:${large?'30px':'22px'};opacity:0.25;">${NEWS_CAT_ICONS[a.category]||'📰'}</span>
         </div>`
    }
    <div style="font-size:10px;color:var(--text-3);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;">${esc(a.source)}</div>
    <div style="font-size:${titleSize};font-weight:${titleWeight};color:var(--text);line-height:1.35;letter-spacing:-0.1px;">${esc(a.title)}</div>
    ${large && a.description ? `<div style="font-size:13px;color:var(--text-2);margin-top:6px;line-height:1.55;">${esc(a.description.slice(0,160))}${a.description.length>160?'…':''}</div>` : ''}
  </a>`;
}

function _renderNewsCats(bycat) {
  const cats = Object.keys(bycat);
  const ordered = NEWS_CAT_ORDER.filter(c=>cats.includes(c));
  const extra = cats.filter(c=>!NEWS_CAT_ORDER.includes(c));
  const allCats = ['All', ...ordered, ...extra];
  return allCats.map(c => {
    const active = newsActiveCat === c;
    return `<button onclick="newsSetCat('${c}')" style="padding:5px 14px;border-radius:100px;font-family:var(--font);font-size:12.5px;font-weight:${active?600:400};cursor:pointer;white-space:nowrap;transition:all .12s;border:1px solid ${active?'var(--text)':'var(--border)'};background:${active?'var(--text)':'transparent'};color:${active?'#fff':'var(--text-2)'};">${c==='All'?'All':c}</button>`;
  }).join('');
}

function newsSetCat(cat) {
  newsActiveCat = cat;
  const catsEl = document.getElementById('news-cats');
  if (catsEl) catsEl.innerHTML = _renderNewsCats(_newsBycat);
  _renderNewsGrid();
}

function _renderNewsGrid() {
  const grid = document.getElementById('news-grid');
  if (!grid) return;
  const bycat = _newsBycat;
  const cats = newsActiveCat === 'All'
    ? NEWS_CAT_ORDER.filter(c=>bycat[c]).concat(Object.keys(bycat).filter(c=>!NEWS_CAT_ORDER.includes(c)))
    : [newsActiveCat];

  let html = '';
  let isFirst = true;
  for (const cat of cats) {
    const arts = bycat[cat] || [];
    if (!arts.length) continue;

    html += `<div style="margin-bottom:40px;">`;

    if (newsActiveCat === 'All') {
      html += `<div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;">${esc(cat)}</div>`;
    }

    if (isFirst && newsActiveCat === 'All') {
      // Hero: big left + 3 stacked right
      html += `<div style="display:grid;grid-template-columns:1.6fr 1fr;gap:24px;margin-bottom:24px;">
        <div>${_newsCardHtml(arts[0], 'hero')}</div>
        <div style="display:flex;flex-direction:column;gap:20px;">${arts.slice(1,4).map(a=>_newsCardHtml(a,'normal')).join('')}</div>
      </div>`;
      if (arts.length > 4) {
        html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;">${arts.slice(4).map(a=>_newsCardHtml(a,'normal')).join('')}</div>`;
      }
      isFirst = false;
    } else if (newsActiveCat !== 'All') {
      // Single category: hero + grid
      html += `<div style="margin-bottom:24px;">${_newsCardHtml(arts[0],'hero')}</div>`;
      if (arts.length > 1) {
        html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">${arts.slice(1).map(a=>_newsCardHtml(a,'medium')).join('')}</div>`;
      }
    } else {
      html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;">${arts.map(a=>_newsCardHtml(a,'normal')).join('')}</div>`;
      isFirst = false;
    }
    html += `</div>`;
  }

  if (!html) html = `<div style="color:var(--text-3);font-size:13px;padding:20px 0;">No articles in this category.</div>`;
  grid.innerHTML = html;
}

async function renderNews() {
  setTopbar("Today's World", '');
  hideInput();
  newsActiveCat = 'All';

  const todayStr = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

  $('content').innerHTML = `
    <div style="max-width:980px;" class="fade-up">
      <div style="padding:22px 28px 20px;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div style="font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-3);">${todayStr} · Morning Briefing</div>
          <button onclick="newsRefresh()" style="padding:5px 12px;border:1px solid var(--border-mid);border-radius:7px;background:none;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .12s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='none'">↻ Refresh</button>
        </div>
        <div id="news-brief" style="color:var(--text-2);line-height:1.7;">
          <span style="color:var(--text-3);font-size:13px;">Loading briefing…</span>
        </div>
      </div>
      <div id="news-cats" style="display:flex;gap:6px;padding:10px 24px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;">
        <div style="color:var(--text-3);font-size:12px;padding:5px 0;">Loading…</div>
      </div>
      <div id="news-grid" style="padding:20px 24px 40px;">
        <div style="padding:20px 0;">${loading('Fetching news from around the world…')}</div>
      </div>
    </div>`;

  try {
    // Fetch news and summary in parallel
    const [d, sumData] = await Promise.all([
      api('/news'),
      api('/news/summary').catch(() => ({summary:''})),
    ]);

    const bycat = d.by_category || {};
    _newsBycat = bycat;

    // Update briefing (render as markdown)
    const briefEl = document.getElementById('news-brief');
    if (briefEl) briefEl.innerHTML = sumData.summary ? `<div class="prose" style="font-size:13.5px;">${marked.parse(sumData.summary)}</div>` : 'Top stories from around the world.';

    if (!Object.keys(bycat).length) {
      document.getElementById('news-grid').innerHTML = `<div style="color:var(--text-2);padding:20px 0;">No news available — check your network connection.</div>`;
      return;
    }

    // Update category tabs
    const catsEl = document.getElementById('news-cats');
    if (catsEl) catsEl.innerHTML = _renderNewsCats(bycat);

    setTopbar("Today's World", d.cached_at ? `Updated ${new Date(d.cached_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}` : '');

    // Render grid
    _renderNewsGrid();
  } catch(e) {
    document.getElementById('news-grid').innerHTML = alertHtml(e.message, 'error');
  }
}

async function newsRefresh() {
  newsActiveCat = 'All';
  _newsBycat = {};
  // Clear cache via refresh=true, then re-render
  try { await fetch('/news?refresh=true'); } catch {}
  renderNews();
}

async function syncGoodNotes(path) {
  const btn = $('gn-sync-btn') || document.querySelector('#content button');
  const al = $('gn-alert');
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  if (al) al.innerHTML = `<div class="alert" style="border-color:var(--border-mid);background:var(--surface-2);">${loading('Scanning iCloud for GoodNotes notebooks…')}</div>`;
  try {
    const body = path ? JSON.stringify({path}) : '{}';
    const r = await fetch('/ingest/goodnotes' + (path ? `?path=${encodeURIComponent(path)}` : ''), {method:'POST'});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed');
    if (al) al.innerHTML = d.documents > 0
      ? alertHtml(`Synced ${d.documents} notebook(s) — ${d.chunks} chunks indexed`)
      : `<div class="alert" style="border-color:var(--border-mid);background:var(--surface-2);color:var(--text-2);">${d.message || 'No text found. See setup instructions above.'}</div>`;
  } catch(e) {
    if (al) al.innerHTML = alertHtml(e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Sync from iCloud'; }
  }
}

function syncGoodNotesFolder() {
  const path = $('gn-path')?.value.trim();
  if (!path) return;
  syncGoodNotes(path);
}

// ── DRAWER ─────────────────────────────────────────────────────────────────────
function openDrawer(i) {
  const s=sources[i]; if(!s) return;
  $('drawer-title').textContent = s.title||'Source';
  $('drawer-source').textContent = `${s.icon||''} ${s.source||''} · [${s.index||i+1}]`;
  $('drawer-body').textContent = s.full_text||s.excerpt||'No content available.';
  const lnk=$('drawer-link');
  if(s.url){lnk.href=s.url;lnk.textContent=s.url;lnk.style.display='';}
  else{lnk.style.display='none';}
  $('drawer').classList.add('open');
}

function closeDrawer() { $('drawer').classList.remove('open'); }

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function runSync() {
  const btn=$('sync-btn'),icon=$('sync-icon'),label=$('sync-label');
  btn.disabled=true;
  icon.innerHTML='<span class="spinner" style="width:12px;height:12px;border-width:1.5px;"></span>';
  label.textContent='Syncing…';
  try {
    await api('/refresh',{method:'POST'});
    icon.textContent='✓'; label.textContent='Synced';
    setTimeout(()=>{icon.textContent='↻';label.textContent='Sync Sources';},3000);
  } catch {
    icon.textContent='↻'; label.textContent='Sync Sources';
  } finally { btn.disabled=false; }
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(e.key==='Escape') closeDrawer();
  if(e.key==='/'&&!e.metaKey){e.preventDefault();setMode('ask');}
  if(!e.metaKey&&!e.ctrlKey){
    if(e.key==='d') setMode('digest');
    if(e.key==='r') setMode('recent');
    if(e.key==='u') setMode('upcoming');
    if(e.key==='n') setMode('note');
    if(e.key==='s') setMode('spark');
    if(e.key==='p') setMode('practice');
    if(e.key==='t') setMode('timeline');
  }
});

marked.setOptions({breaks:true,gfm:true});

// ── ONBOARDING ─────────────────────────────────────────────────────────────────
const ONBOARDING_KEY = 'neuron_onboarded_v1';

async function checkOnboarding() {
  if (localStorage.getItem(ONBOARDING_KEY)) { setMode('digest'); return; }
  try {
    const d = await fetch('/status').then(r=>r.json());
    if ((d.total_chunks || 0) > 0) {
      localStorage.setItem(ONBOARDING_KEY, '1');
      setMode('digest');
    } else {
      renderOnboarding();
    }
  } catch {
    setMode('digest');
  }
}

async function onbConnect(id) {
  const itg = INTEGRATIONS.find(i=>i.id===id);
  if (!itg) return;
  const btn = $(`onb-btn-${id}`);
  if (btn) { btn.disabled=true; btn.textContent='Connecting…'; }
  try {
    await itg.setup();
    // Check if connection worked
    const connected = await itg.check();
    const card = $(`onb-${id}`);
    if (connected && card) {
      card.style.borderColor = 'var(--success)';
      if (btn) { btn.textContent='✓ Connected'; btn.style.color='var(--success)'; btn.style.borderColor='rgba(52,199,89,0.4)'; }
    } else {
      if (btn) { btn.disabled=false; btn.textContent=itg.action; }
    }
  } catch {
    if (btn) { btn.disabled=false; btn.textContent=itg.action; }
  }
  // Enable finish if at least one is connected
  const anyConnected = await Promise.all(INTEGRATIONS.map(i=>i.check())).then(r=>r.some(Boolean));
  const finishBtn = $('onb-finish-btn');
  if (finishBtn) { finishBtn.disabled=!anyConnected; finishBtn.style.opacity=anyConnected?'1':'0.5'; }
}

async function finishOnboarding() {
  const statusEl = $('onb-status');
  if (statusEl) statusEl.textContent = 'Syncing your sources…';
  const finishBtn = $('onb-finish-btn');
  if (finishBtn) { finishBtn.disabled=true; finishBtn.textContent='Syncing…'; }
  try { await fetch('/refresh', {method:'POST'}); } catch {}
  localStorage.setItem(ONBOARDING_KEY, '1');
  setMode('digest');
}

function skipOnboarding() {
  localStorage.setItem(ONBOARDING_KEY, '1');
  setMode('digest');
}

checkOnboarding();
